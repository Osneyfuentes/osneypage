<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="¡Nos Casamos! Alejandro & Valeria">
    <meta property="og:description" content="Haz clic para ver nuestra invitación mágica ❤️">
    <meta property="og:image" content="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=500"> <meta property="og:type" content="website">

    <title>Invitación de Boda - Alejandro y Valeria</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4eae3; /* Beige suave */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 2px solid #e0c8b0;
            position: relative;
            z-index: 5;
        }

        .romantic-font {
            font-family: 'Dancing Script', cursive;
            color: #b08d57; /* Dorado mate */
            font-size: 3em;
            margin: 10px 0;
        }

        h3 {
            font-weight: 300;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        p {
            color: #777;
            line-height: 1.6;
        }

        .date-box {
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 15px 0;
            margin: 20px 0;
        }

        #magicButton {
            background-color: #b08d57;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(176, 141, 87, 0.4);
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
        }

        #magicButton:hover {
            background-color: #967540;
            transform: translateY(-2px);
        }

        /* ESTILO DE LOS CORAZONES VOLADORES */
        .heart-particle {
            position: fixed; /* Cambiado a fixed para que salgan de la tarjeta */
            color: #d63031;
            font-size: 20px;
            pointer-events: none;
            user-select: none;
            z-index: 100;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="card" id="cardContainer">
        <h3>Nos Casamos</h3>
        <div class="romantic-font">Alejandro</div>
        <div style="font-size: 1.5em; color: #b08d57;">&</div>
        <div class="romantic-font">Valeria</div>

        <p>Tenemos el placer de invitarte a compartir la alegría de nuestra unión.</p>

        <div class="date-box">
            <p>Sábado, 14 de Septiembre de 2024</p>
            <p>18:30 Horas</p>
        </div>

        <p>Hacienda El Estribo, Cabimas</p>
        
        <button id="magicButton">¡Confirmar Asistencia!</button>
    </div>

    <script>
        const button = document.getElementById('magicButton');

        function createExplosion(e) {
            const numberOfHearts = 50;
            
            // Obtenemos la posición exacta del clic o toque
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);

            for (let i = 0; i < numberOfHearts; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart-particle');
                heart.innerHTML = '❤️';

                // Posición inicial (donde se hizo clic)
                heart.style.left = clientX + 'px';
                heart.style.top = clientY + 'px';

                // Dirección aleatoria
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 300 + 100;
                const destinationX = Math.cos(angle) * velocity;
                const destinationY = Math.sin(angle) * velocity;

                heart.style.setProperty('--tx', `${destinationX}px`);
                heart.style.setProperty('--ty', `${destinationY}px`);

                // Tamaño y rotación aleatoria
                const size = Math.random() * 20 + 10;
                heart.style.fontSize = `${size}px`;
                
                const duration = Math.random() * 1 + 0.8;
                heart.style.animation = `explode ${duration}s ease-out forwards`;

                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, duration * 1000);
            }
        }

        button.addEventListener('mousedown', createExplosion);
        button.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Evita doble clic en móviles
            createExplosion(e);
        });
    </script>
</body>
</html>
