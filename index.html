<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="¡Nuestra Boda! Alejandro & Valeria">
    <meta property="og:description" content="Haz clic para confirmar tu asistencia con un toque de magia ❤️">
    <meta property="og:image" content="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?q=80&w=500">
    <meta property="og:type" content="website">

    <title>Invitación de Boda - Alejandro y Valeria</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dorado: #b08d57;
            --rojo-corazon: #d63031;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4eae3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .card {
            background-color: #ffffff;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 2px solid #e0c8b0;
            position: relative;
            z-index: 5;
        }

        .romantic-font {
            font-family: 'Dancing Script', cursive;
            color: var(--dorado);
            font-size: 3.2em;
            margin: 10px 0;
        }

        h3 {
            font-weight: 300;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.85em;
            margin-bottom: 10px;
        }

        p {
            color: #777;
            line-height: 1.6;
            font-size: 0.95em;
        }

        .date-box {
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 15px 0;
            margin: 20px 0;
        }

        /* INPUT DE NOMBRE */
        #nombreInvitado {
            width: 85%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            outline: none;
            transition: border 0.3s;
        }

        #nombreInvitado:focus {
            border-color: var(--dorado);
        }

        /* BOTÓN MÁGICO */
        #magicButton {
            background-color: var(--dorado);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(176, 141, 87, 0.4);
            transition: all 0.3s ease;
            width: 100%;
        }

        #magicButton:active {
            transform: scale(0.95);
        }

        /* PARTÍCULAS */
        .heart-particle {
            position: fixed;
            color: var(--rojo-corazon);
            pointer-events: none;
            z-index: 100;
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(360deg); opacity: 0; }
        }

        .maps-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--dorado);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

    <div class="card" id="cardContainer">
        <h3>Nos Casamos</h3>
        <div class="romantic-font">Alejandro</div>
        <div style="font-size: 1.5em; color: var(--dorado);">&</div>
        <div class="romantic-font">Valeria</div>

        <p>Queremos que seas parte de este día tan especial para nosotros.</p>

        <div class="date-box">
            <p><strong>Sábado, 14 de Septiembre de 2024</strong></p>
            <p>18:30 Horas</p>
            <p>Hacienda El Estribo, Cabimas</p>
        </div>

        <input type="text" id="nombreInvitado" placeholder="Escribe tu nombre aquí">
        
        <button id="magicButton">¡Confirmar Asistencia!</button>

        <a href="https://maps.app.goo.gl/uXpQWrtJ1mQf2XfX9" target="_blank" class="maps-link">
            📍 Ver ubicación en Maps
        </a>
    </div>

    <script>
        const button = document.getElementById('magicButton');
        const inputNombre = document.getElementById('nombreInvitado');

        function createExplosion(x, y) {
            const numberOfHearts = 40;
            for (let i = 0; i < numberOfHearts; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart-particle');
                heart.innerHTML = '❤️';
                heart.style.left = x + 'px';
                heart.style.top = y + 'px';

                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 250 + 50;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;

                heart.style.setProperty('--tx', `${tx}px`);
                heart.style.setProperty('--ty', `${ty}px`);
                heart.style.fontSize = Math.random() * 15 + 15 + 'px';
                heart.style.animation = `explode ${Math.random() * 1 + 0.5}s ease-out forwards`;

                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1500);
            }
        }

        button.addEventListener('click', (e) => {
            const nombre = inputNombre.value.trim();
            
            if (nombre === "") {
                alert("Por favor, ingresa tu nombre ❤️");
                inputNombre.focus();
                return;
            }

            // Ejecutar corazones
            createExplosion(e.clientX, e.clientY);

            // Datos de WhatsApp
            const telefono = "584120000000"; // CAMBIA ESTE NÚMERO
            const mensaje = encodeURIComponent(`¡Hola! Soy ${nombre}. Confirmo mi asistencia a la boda. 🥂❤️`);
            const url = `https://wa.me/${+58 412-3183549}?text=${mensaje}`;

            // Esperar animación y redirigir
            setTimeout(() => {
                window.location.href = url;
            }, 1200);
        });
    </script>
</body>
</html>
